<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Финансы</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1828;
    --surface2: #221f35;
    --border: #2e2a45;
    --income: #3ddc97;
    --expense: #ff6b6b;
    --accent: #a78bfa;
    --text: #e8e6f0;
    --muted: #7c7a8e;
    --card-shadow: 0 4px 32px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* GRAIN OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.5;
  }

  header {
    background: linear-gradient(135deg, #1a1828 0%, #12101e 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 4vw, 1.8rem);
    background: linear-gradient(135deg, var(--income), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }

  header p {
    color: var(--muted);
    font-size: 0.78rem;
    font-weight: 300;
    margin-top: 2px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 16px 100px;
  }

  /* BALANCE CARD */
  .balance-card {
    background: linear-gradient(135deg, #1e1b32 0%, #16132b 100%);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--card-shadow);
    animation: fadeUp 0.4s ease;
  }

  .balance-card::after {
    content: '';
    position: absolute;
    top: -60px;
    right: -60px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(167,139,250,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .balance-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .balance-amount {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 8vw, 3rem);
    font-weight: 700;
    line-height: 1;
    margin-bottom: 24px;
    transition: all 0.3s ease;
  }

  .balance-amount.positive { color: var(--income); }
  .balance-amount.negative { color: var(--expense); }
  .balance-amount.zero { color: var(--text); }

  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .stat-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
  }

  .stat-box .label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .stat-box .amount {
    font-size: 1.2rem;
    font-weight: 600;
  }

  .stat-box.income-box .amount { color: var(--income); }
  .stat-box.expense-box .amount { color: var(--expense); }

  /* FORM */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px 20px;
    margin-bottom: 20px;
    box-shadow: var(--card-shadow);
    animation: fadeUp 0.4s ease 0.1s both;
  }

  .form-card h2 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .type-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .type-btn {
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .type-btn:hover { border-color: var(--accent); color: var(--text); }

  .type-btn.active-income {
    background: rgba(61,220,151,0.12);
    border-color: var(--income);
    color: var(--income);
  }

  .type-btn.active-expense {
    background: rgba(255,107,107,0.12);
    border-color: var(--expense);
    color: var(--expense);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }

  input, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  input:focus, select:focus { border-color: var(--accent); }

  select option { background: var(--surface2); }

  .add-btn {
    grid-column: 1 / -1;
    margin-top: 4px;
    padding: 13px;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .add-btn.income-btn {
    background: linear-gradient(135deg, #2dcc87, #3ddc97);
    color: #0a2018;
    box-shadow: 0 4px 20px rgba(61,220,151,0.3);
  }

  .add-btn.expense-btn {
    background: linear-gradient(135deg, #e55, #ff6b6b);
    color: #1a0808;
    box-shadow: 0 4px 20px rgba(255,107,107,0.3);
  }

  .add-btn:hover { transform: translateY(-1px); filter: brightness(1.05); }
  .add-btn:active { transform: translateY(0); }

  /* FILTER */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }

  .filter-row::-webkit-scrollbar { display: none; }

  .filter-btn {
    padding: 7px 16px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* TRANSACTIONS */
  .section-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .tx-list { display: flex; flex-direction: column; gap: 8px; }

  .tx-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: fadeUp 0.3s ease;
    transition: all 0.2s;
  }

  .tx-item:hover { border-color: rgba(167,139,250,0.3); transform: translateX(2px); }

  .tx-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .tx-icon.income { background: rgba(61,220,151,0.15); }
  .tx-icon.expense { background: rgba(255,107,107,0.15); }

  .tx-info { flex: 1; min-width: 0; }

  .tx-desc {
    font-size: 0.9rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tx-meta {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 2px;
    display: flex;
    gap: 8px;
  }

  .tx-cat {
    background: rgba(167,139,250,0.1);
    border: 1px solid rgba(167,139,250,0.2);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 0.65rem;
    color: var(--accent);
  }

  .tx-amount {
    font-size: 1rem;
    font-weight: 600;
    flex-shrink: 0;
    text-align: right;
  }

  .tx-amount.income { color: var(--income); }
  .tx-amount.expense { color: var(--expense); }

  .tx-delete {
    background: none;
    border: none;
    color: var(--border);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px;
    border-radius: 6px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .tx-delete:hover { color: var(--expense); background: rgba(255,107,107,0.1); }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.4; }
  .empty-state p { font-size: 0.88rem; }

  /* CHART */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px 20px;
    margin-bottom: 20px;
    box-shadow: var(--card-shadow);
    animation: fadeUp 0.4s ease 0.15s both;
  }

  .chart-bars {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 100px;
    margin-top: 12px;
  }

  .chart-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 0;
  }

  .chart-bar-wrap {
    width: 100%;
    height: 80px;
    display: flex;
    align-items: flex-end;
    gap: 2px;
  }

  .chart-bar {
    flex: 1;
    border-radius: 4px 4px 0 0;
    transition: height 0.5s cubic-bezier(0.34,1.56,0.64,1);
    min-height: 2px;
  }

  .chart-bar.income-bar { background: var(--income); opacity: 0.8; }
  .chart-bar.expense-bar { background: var(--expense); opacity: 0.8; }

  .chart-label {
    font-size: 0.6rem;
    color: var(--muted);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  .chart-legend {
    display: flex;
    gap: 16px;
    margin-top: 12px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 24px;
    font-size: 0.85rem;
    z-index: 200;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 400px) {
    .form-grid { grid-template-columns: 1fr; }
    main { padding: 16px 12px 80px; }
  }
</style>
</head>
<body>

<header>
  <h1>💸 Мои Финансы</h1>
  <p>Учёт доходов и расходов</p>
</header>

<main>
  <!-- BALANCE -->
  <div class="balance-card">
    <div class="balance-label">Текущий баланс</div>
    <div class="balance-amount" id="balanceAmount">0 ₽</div>
    <div class="stats-row">
      <div class="stat-box income-box">
        <div class="label">↑ Доходы</div>
        <div class="amount" id="totalIncome">0 ₽</div>
      </div>
      <div class="stat-box expense-box">
        <div class="label">↓ Расходы</div>
        <div class="amount" id="totalExpense">0 ₽</div>
      </div>
    </div>
  </div>

  <!-- FORM -->
  <div class="form-card">
    <h2>Новая запись</h2>
    <div class="type-toggle">
      <button class="type-btn active-income" id="btnIncome" onclick="setType('income')">💚 Доход</button>
      <button class="type-btn" id="btnExpense" onclick="setType('expense')">🔴 Расход</button>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>Сумма (₽)</label>
        <input type="number" id="amount" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Категория</label>
        <select id="category"></select>
      </div>
      <div class="form-group full">
        <label>Описание</label>
        <input type="text" id="desc" placeholder="Например: Зарплата...">
      </div>
      <div class="form-group">
        <label>Дата</label>
        <input type="date" id="date">
      </div>
      <button class="add-btn income-btn" id="addBtn" onclick="addTransaction()">+ Добавить</button>
    </div>
  </div>

  <!-- CHART -->
  <div class="chart-card" id="chartCard" style="display:none">
    <div class="section-title">Динамика по месяцам</div>
    <div class="chart-bars" id="chartBars"></div>
    <div class="chart-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--income)"></div>Доходы</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--expense)"></div>Расходы</div>
    </div>
  </div>

  <!-- LIST -->
  <div class="section-title">История транзакций</div>
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">Все</button>
    <button class="filter-btn" onclick="setFilter('income', this)">Доходы</button>
    <button class="filter-btn" onclick="setFilter('expense', this)">Расходы</button>
  </div>
  <div class="tx-list" id="txList"></div>
</main>

<div class="toast" id="toast"></div>

<script>
const INCOME_CATS = ['Зарплата','Фриланс','Подарок','Инвестиции','Другое'];
const EXPENSE_CATS = ['Еда','Транспорт','Жильё','Здоровье','Развлечения','Одежда','Связь','Кредит','Другое'];
const CAT_ICONS = {
  'Зарплата':'💼','Фриланс':'💻','Подарок':'🎁','Инвестиции':'📈','Другое':'💫',
  'Еда':'🍕','Транспорт':'🚗','Жильё':'🏠','Здоровье':'💊','Развлечения':'🎬',
  'Одежда':'👗','Связь':'📱','Кредит':'🏦'
};

let currentType = 'income';
let currentFilter = 'all';
let transactions = JSON.parse(localStorage.getItem('finTransactions') || '[]');

function setType(type) {
  currentType = type;
  const sel = document.getElementById('category');
  const cats = type === 'income' ? INCOME_CATS : EXPENSE_CATS;
  sel.innerHTML = cats.map(c => `<option>${c}</option>`).join('');

  document.getElementById('btnIncome').className = 'type-btn' + (type === 'income' ? ' active-income' : '');
  document.getElementById('btnExpense').className = 'type-btn' + (type === 'expense' ? ' active-expense' : '');

  const btn = document.getElementById('addBtn');
  btn.className = `add-btn ${type}-btn`;
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function addTransaction() {
  const amt = parseFloat(document.getElementById('amount').value);
  const cat = document.getElementById('category').value;
  const desc = document.getElementById('desc').value.trim() || cat;
  const date = document.getElementById('date').value || new Date().toISOString().split('T')[0];

  if (!amt || amt <= 0) { showToast('⚠️ Введите корректную сумму'); return; }

  transactions.unshift({ id: Date.now(), type: currentType, amount: amt, category: cat, desc, date });
  save();
  document.getElementById('amount').value = '';
  document.getElementById('desc').value = '';
  showToast(currentType === 'income' ? '💚 Доход добавлен!' : '🔴 Расход добавлен!');
  render();
}

function deleteTransaction(id) {
  transactions = transactions.filter(t => t.id !== id);
  save();
  render();
  showToast('🗑️ Запись удалена');
}

function save() {
  localStorage.setItem('finTransactions', JSON.stringify(transactions));
}

function fmt(n) {
  return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', maximumFractionDigits: 0 }).format(n);
}

function fmtDate(d) {
  return new Date(d).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
}

function render() {
  const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const balance = income - expense;

  const balEl = document.getElementById('balanceAmount');
  balEl.textContent = fmt(balance);
  balEl.className = 'balance-amount ' + (balance > 0 ? 'positive' : balance < 0 ? 'negative' : 'zero');
  document.getElementById('totalIncome').textContent = fmt(income);
  document.getElementById('totalExpense').textContent = fmt(expense);

  renderList();
  renderChart();
}

function renderList() {
  const list = document.getElementById('txList');
  const filtered = currentFilter === 'all' ? transactions : transactions.filter(t => t.type === currentFilter);

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">🪙</div><p>Записей пока нет</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(t => `
    <div class="tx-item">
      <div class="tx-icon ${t.type}">${CAT_ICONS[t.category] || '💫'}</div>
      <div class="tx-info">
        <div class="tx-desc">${t.desc}</div>
        <div class="tx-meta">
          <span>${fmtDate(t.date)}</span>
          <span class="tx-cat">${t.category}</span>
        </div>
      </div>
      <div class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</div>
      <button class="tx-delete" onclick="deleteTransaction(${t.id})">✕</button>
    </div>
  `).join('');
}

function renderChart() {
  if (transactions.length < 2) { document.getElementById('chartCard').style.display = 'none'; return; }
  document.getElementById('chartCard').style.display = 'block';

  const months = {};
  transactions.forEach(t => {
    const key = t.date.slice(0, 7);
    if (!months[key]) months[key] = { income: 0, expense: 0 };
    months[key][t.type] += t.amount;
  });

  const keys = Object.keys(months).sort().slice(-6);
  const maxVal = Math.max(...keys.flatMap(k => [months[k].income, months[k].expense]), 1);

  const monthNames = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];

  document.getElementById('chartBars').innerHTML = keys.map(k => {
    const ih = Math.round((months[k].income / maxVal) * 76);
    const eh = Math.round((months[k].expense / maxVal) * 76);
    const [y, m] = k.split('-');
    const label = monthNames[parseInt(m) - 1];
    return `
      <div class="chart-col">
        <div class="chart-bar-wrap">
          <div class="chart-bar income-bar" style="height:${ih}px"></div>
          <div class="chart-bar expense-bar" style="height:${eh}px"></div>
        </div>
        <div class="chart-label">${label}</div>
      </div>
    `;
  }).join('');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// INIT
document.getElementById('date').valueAsDate = new Date();
setType('income');
render();
</script>
</body>
</html>
