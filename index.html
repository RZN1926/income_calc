<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финансы</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f5;
            --white: #ffffff;
            --surface: #f7f8fa;
            --border: #e8eaed;
            --income: #00c48c;
            --income-bg: #e6f9f4;
            --expense: #ff647c;
            --expense-bg: #fff0f2;
            --accent: #5b6af0;
            --accent-bg: #eef0fd;
            --text: #1a1d2e;
            --sub: #6b7280;
            --muted: #9ca3af;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* HEADER */
        header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, #5b6af0, #8b5cf6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .logo-text {
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        /* AUTH */
        .auth-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border);
        }

        .user-avatar-placeholder {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5b6af0, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .user-name {
            font-size: 0.78rem;
            font-weight: 600;
            max-width: 110px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .btn-login {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 8px 14px;
            border-radius: 22px;
            border: 1.5px solid var(--border);
            background: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.18s;
            color: var(--text);
        }

        .btn-login:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-bg);
        }

        .btn-login svg {
            flex-shrink: 0;
        }

        .btn-logout {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            transition: all 0.15s;
            color: var(--muted);
        }

        .btn-logout:hover {
            background: #ffe4e4;
            border-color: var(--expense);
            color: var(--expense);
        }

        /* SYNC BADGE */
        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--muted);
        }

        .sync-dot.synced {
            background: var(--income);
        }

        .sync-dot.syncing {
            background: #f59e0b;
            animation: pulse 1s infinite;
        }

        .sync-dot.error {
            background: var(--expense);
        }

        /* LOGIN SCREEN */
        .login-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 61px);
            padding: 20px;
            text-align: center;
        }

        .login-screen.visible {
            display: flex;
        }

        .login-card {
            background: var(--white);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            max-width: 340px;
            width: 100%;
        }

        .login-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .login-title {
            font-size: 1.35rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .login-sub {
            font-size: 0.85rem;
            color: var(--sub);
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 13px;
            border-radius: 14px;
            border: 2px solid var(--border);
            background: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 0.93rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.18s;
            color: var(--text);
        }

        .btn-google:hover {
            border-color: var(--accent);
            background: var(--accent-bg);
            color: var(--accent);
            box-shadow: 0 4px 20px rgba(91, 106, 240, 0.15);
        }

        /* MAIN */
        main {
            max-width: 640px;
            margin: 0 auto;
            padding: 18px 14px 100px;
        }

        /* LOADING */
        .loading-overlay {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            gap: 14px;
        }

        .loading-overlay.visible {
            display: flex;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        .loading-text {
            font-size: 0.85rem;
            color: var(--muted);
            font-weight: 500;
        }

        /* BALANCE CARD */
        .balance-card {
            background: linear-gradient(135deg, #5b6af0 0%, #8b5cf6 100%);
            border-radius: 22px;
            padding: 26px 22px 22px;
            color: white;
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(91, 106, 240, 0.35);
        }

        .balance-card::before {
            content: '';
            position: absolute;
            top: -40px;
            right: -40px;
            width: 160px;
            height: 160px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
        }

        .balance-card::after {
            content: '';
            position: absolute;
            bottom: -50px;
            left: 20px;
            width: 130px;
            height: 130px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .bal-label {
            font-size: 0.7rem;
            font-weight: 500;
            opacity: 0.75;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .bal-amount {
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1.1;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            transition: opacity 0.2s;
        }

        .bal-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            position: relative;
            z-index: 1;
        }

        .bal-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 11px 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .bal-box-label {
            font-size: 0.65rem;
            opacity: 0.75;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 3px;
        }

        .bal-box-amt {
            font-size: 1rem;
            font-weight: 700;
        }

        /* TYPE TOGGLE */
        .type-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }

        .type-btn {
            padding: 11px;
            border-radius: 14px;
            border: 2px solid var(--border);
            background: var(--white);
            color: var(--sub);
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.18s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .type-btn.active-income {
            background: var(--income-bg);
            border-color: var(--income);
            color: var(--income);
        }

        .type-btn.active-expense {
            background: var(--expense-bg);
            border-color: var(--expense);
            color: var(--expense);
        }

        /* FORM CARD */
        .form-card {
            background: var(--white);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .sec-label {
            font-size: 0.67rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .amount-wrap {
            position: relative;
            margin-bottom: 16px;
        }

        .amount-sym {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3rem;
            font-weight: 300;
            color: var(--muted);
            pointer-events: none;
        }

        #amountInput {
            width: 100%;
            font-family: 'Inter', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text);
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 13px 14px 13px 42px;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }

        #amountInput:focus {
            border-color: var(--accent);
        }

        #amountInput::placeholder {
            color: var(--muted);
            font-weight: 300;
        }

        .cat-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
            margin-bottom: 14px;
        }

        .cat-scroll::-webkit-scrollbar {
            display: none;
        }

        .cat-card {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 9px 11px;
            border-radius: 14px;
            border: 2px solid var(--border);
            background: var(--white);
            cursor: pointer;
            transition: all 0.16s;
            min-width: 60px;
            user-select: none;
        }

        .cat-card .cat-em {
            font-size: 1.35rem;
            line-height: 1;
        }

        .cat-card .cat-nm {
            font-size: 0.58rem;
            font-weight: 600;
            color: var(--sub);
            text-align: center;
            white-space: nowrap;
            max-width: 58px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cat-card:hover {
            border-color: var(--accent);
            background: var(--accent-bg);
        }

        .cat-card.sel-income {
            background: var(--income-bg);
            border-color: var(--income);
        }

        .cat-card.sel-income .cat-nm {
            color: var(--income);
        }

        .cat-card.sel-expense {
            background: var(--expense-bg);
            border-color: var(--expense);
        }

        .cat-card.sel-expense .cat-nm {
            color: var(--expense);
        }

        .cat-card.add-card {
            border-style: dashed;
            opacity: 0.65;
        }

        .cat-card.add-card:hover {
            opacity: 1;
        }

        .new-cat-row {
            display: none;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
        }

        .new-cat-row.open {
            display: flex;
        }

        .em-btn {
            width: 42px;
            height: 42px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: border-color 0.15s;
        }

        .em-btn:hover {
            border-color: var(--accent);
        }

        .nc-input {
            flex: 1;
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            padding: 10px 13px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }

        .nc-input:focus {
            border-color: var(--accent);
        }

        .nc-ok {
            width: 42px;
            height: 42px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: filter 0.15s;
        }

        .nc-ok:hover {
            filter: brightness(1.1);
        }

        .ep {
            display: none;
            flex-wrap: wrap;
            gap: 4px;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px;
            margin-bottom: 10px;
            box-shadow: var(--shadow-lg);
        }

        .ep.open {
            display: flex;
        }

        .ep-em {
            font-size: 1.25rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 8px;
            transition: background 0.1s;
            line-height: 1;
        }

        .ep-em:hover {
            background: var(--surface);
        }

        .row2 {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            margin-bottom: 14px;
            align-items: end;
        }

        .f-col {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .f-col input {
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            padding: 10px 13px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
            width: 100%;
        }

        .f-col input:focus {
            border-color: var(--accent);
        }

        .date-ctrl {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .day-btn {
            width: 36px;
            height: 36px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--white);
            color: var(--sub);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.15s;
            line-height: 1;
            font-family: 'Inter', sans-serif;
        }

        .day-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-bg);
        }

        .day-btn:active {
            transform: scale(0.88);
        }

        #dateInput {
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 8px 9px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
            width: 124px;
        }

        #dateInput:focus {
            border-color: var(--accent);
        }

        .add-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.18s;
            letter-spacing: 0.2px;
        }

        .add-btn.income-btn {
            background: var(--income);
            color: white;
            box-shadow: 0 4px 20px rgba(0, 196, 140, 0.3);
        }

        .add-btn.expense-btn {
            background: var(--expense);
            color: white;
            box-shadow: 0 4px 20px rgba(255, 100, 124, 0.3);
        }

        .add-btn:hover {
            filter: brightness(1.06);
            transform: translateY(-1px);
        }

        .add-btn:active {
            transform: translateY(0);
            filter: brightness(0.97);
        }

        .add-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        /* CHART */
        .chart-card {
            background: var(--white);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .chart-hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .chart-ttl {
            font-size: 0.88rem;
            font-weight: 700;
        }

        .chart-leg {
            display: flex;
            gap: 12px;
        }

        .leg-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.68rem;
            color: var(--sub);
        }

        .leg-dot {
            width: 8px;
            height: 8px;
            border-radius: 3px;
        }

        .chart-bars {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            height: 86px;
        }

        .chart-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .bar-wrap {
            width: 100%;
            height: 70px;
            display: flex;
            align-items: flex-end;
            gap: 2px;
        }

        .bar {
            flex: 1;
            border-radius: 4px 4px 0 0;
            transition: height 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            min-height: 2px;
        }

        .bar.in {
            background: var(--income);
            opacity: 0.85;
        }

        .bar.ex {
            background: var(--expense);
            opacity: 0.85;
        }

        .bar-lbl {
            font-size: 0.58rem;
            color: var(--muted);
            font-weight: 600;
        }

        /* PERIOD FILTER */
        .period-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 14px;
        }

        .period-tabs {
            display: flex;
            background: var(--surface);
            border-radius: 12px;
            padding: 3px;
            gap: 2px;
            border: 1px solid var(--border);
        }

        .p-tab {
            padding: 6px 13px;
            border-radius: 9px;
            border: none;
            background: transparent;
            color: var(--muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .p-tab.active {
            background: var(--white);
            color: var(--accent);
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .period-nav {
            display: none;
            align-items: center;
            gap: 4px;
            flex: 1;
        }

        .period-nav.visible {
            display: flex;
        }

        .pnav-btn {
            width: 30px;
            height: 30px;
            border: 1.5px solid var(--border);
            border-radius: 9px;
            background: var(--white);
            color: var(--sub);
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.15s;
        }

        .pnav-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-bg);
        }

        .period-label {
            flex: 1;
            text-align: center;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
        }

        /* HISTORY */
        .hist-card {
            background: var(--white);
            border-radius: 20px;
            padding: 18px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .hist-hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .hist-ttl {
            font-size: 0.88rem;
            font-weight: 700;
        }

        .filter-row {
            display: flex;
            gap: 5px;
        }

        .f-btn {
            padding: 5px 11px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .f-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .tx-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .tx-item {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 11px;
            border-radius: 14px;
            border: 1.5px solid transparent;
            background: var(--surface);
            transition: all 0.18s;
            animation: sIn 0.22s ease;
        }

        .tx-item:hover {
            border-color: var(--border);
            background: var(--white);
            box-shadow: var(--shadow);
        }

        .tx-ic {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .tx-ic.income {
            background: var(--income-bg);
        }

        .tx-ic.expense {
            background: var(--expense-bg);
        }

        .tx-inf {
            flex: 1;
            min-width: 0;
        }

        .tx-desc {
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tx-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }

        .tx-dt {
            font-size: 0.68rem;
            color: var(--muted);
        }

        .tx-badge {
            font-size: 0.58rem;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 20px;
            background: var(--accent-bg);
            color: var(--accent);
        }

        .tx-right {
            display: flex;
            align-items: center;
            gap: 7px;
            flex-shrink: 0;
        }

        .tx-amt {
            font-size: 0.92rem;
            font-weight: 700;
        }

        .tx-amt.income {
            color: var(--income);
        }

        .tx-amt.expense {
            color: var(--expense);
        }

        .tx-del {
            width: 26px;
            height: 26px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .tx-del:hover {
            background: #ffe4e4;
            color: var(--expense);
        }

        .empty {
            text-align: center;
            padding: 36px 20px;
            color: var(--muted);
        }

        .empty .ei {
            font-size: 2.2rem;
            margin-bottom: 8px;
            opacity: 0.45;
        }

        .empty p {
            font-size: 0.82rem;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(90px);
            background: #1a1d2e;
            color: white;
            border-radius: 14px;
            padding: 11px 20px;
            font-size: 0.83rem;
            font-weight: 500;
            z-index: 200;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @keyframes sIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.4
            }
        }

        @media (max-width: 380px) {
            .row2 {
                grid-template-columns: 1fr;
            }

            .date-ctrl {
                justify-content: flex-start;
            }

            main {
                padding: 14px 12px 80px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <div class="logo-icon">💸</div>
            <span class="logo-text">Финансы</span>
        </div>
        <div class="auth-area">
            <div class="sync-dot" id="syncDot" title="Статус синхронизации"></div>
            <!-- Logged out -->
            <button class="btn-login" id="btnLogin" onclick="loginGoogle()" style="display:none">
                <svg width="16" height="16" viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                Войти
            </button>
            <!-- Logged in -->
            <div class="user-info" id="userInfo" style="display:none">
                <div class="user-avatar-placeholder" id="userAvatar">?</div>
                <span class="user-name" id="userName"></span>
                <button class="btn-logout" onclick="logoutUser()" title="Выйти">↩</button>
            </div>
        </div>
    </header>

    <!-- LOGIN SCREEN -->
    <div class="login-screen visible" id="loginScreen">
        <div class="login-card">
            <div class="login-icon">💸</div>
            <div class="login-title">Личные финансы</div>
            <div class="login-sub">Войдите, чтобы ваши данные сохранялись в облаке и были доступны с любого устройства
            </div>
            <button class="btn-google" onclick="loginGoogle()">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84z" />
                </svg>
                Войти через Google
            </button>
        </div>
    </div>

    <!-- LOADING -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">Загружаем ваши данные…</div>
    </div>

    <!-- APP -->
    <main id="appMain" style="display:none">

        <div class="balance-card">
            <div class="bal-label">Общий баланс</div>
            <div class="bal-amount" id="balAmount">0,00 ⃀</div>
            <div class="bal-row">
                <div class="bal-box">
                    <div class="bal-box-label">↑ Доходы</div>
                    <div class="bal-box-amt" id="totIncome">0,00 ⃀</div>
                </div>
                <div class="bal-box">
                    <div class="bal-box-label">↓ Расходы</div>
                    <div class="bal-box-amt" id="totExpense">0,00 ⃀</div>
                </div>
            </div>
        </div>

        <div class="type-toggle">
            <button class="type-btn active-income" id="btnIncome" onclick="setType('income')">↑ Доход</button>
            <button class="type-btn" id="btnExpense" onclick="setType('expense')">↓ Расход</button>
        </div>

        <div class="form-card">
            <div class="sec-label">Сумма</div>
            <div class="amount-wrap">
                <span class="amount-sym">⃀</span>
                <input type="number" id="amountInput" placeholder="0.00" min="0" step="0.01" inputmode="decimal">
            </div>

            <div class="sec-label">Категория</div>
            <div class="cat-scroll" id="catScroll"></div>

            <div class="new-cat-row" id="newCatRow">
                <button class="em-btn" id="emBtn" onclick="toggleEP()" title="Выбрать эмодзи">😊</button>
                <input class="nc-input" id="ncInput" type="text" placeholder="Название...">
                <button class="nc-ok" onclick="confirmCat()">✓</button>
            </div>
            <div class="ep" id="emPicker"></div>

            <div class="row2">
                <div class="f-col">
                    <div class="sec-label">Описание</div>
                    <input type="text" id="descInput" placeholder="Необязательно...">
                </div>
                <div class="f-col">
                    <div class="sec-label">Дата</div>
                    <div class="date-ctrl">
                        <button class="day-btn" onclick="shiftDate(-1)">−</button>
                        <input type="date" id="dateInput">
                        <button class="day-btn" onclick="shiftDate(+1)">+</button>
                    </div>
                </div>
            </div>

            <button class="add-btn income-btn" id="addBtn" onclick="addTx()">Добавить запись</button>
        </div>

        <div class="chart-card" id="chartCard" style="display:none">
            <div class="chart-hdr">
                <div class="chart-ttl">По месяцам</div>
                <div class="chart-leg">
                    <div class="leg-item">
                        <div class="leg-dot" style="background:var(--income)"></div>Доходы
                    </div>
                    <div class="leg-item">
                        <div class="leg-dot" style="background:var(--expense)"></div>Расходы
                    </div>
                </div>
            </div>
            <div class="chart-bars" id="chartBars"></div>
        </div>

        <div class="period-row">
            <div class="period-tabs">
                <button class="p-tab active" onclick="setPeriod('all',this)">Всё время</button>
                <button class="p-tab" onclick="setPeriod('week',this)">Неделя</button>
                <button class="p-tab" onclick="setPeriod('month',this)">Месяц</button>
            </div>
            <div class="period-nav" id="periodNav">
                <button class="pnav-btn" onclick="shiftPeriod(-1)">‹</button>
                <div class="period-label" id="periodLabel"></div>
                <button class="pnav-btn" onclick="shiftPeriod(+1)">›</button>
            </div>
        </div>

        <div class="hist-card">
            <div class="hist-hdr">
                <div class="hist-ttl">История</div>
                <div class="filter-row">
                    <button class="f-btn active" onclick="setFilter('all',this)">Все</button>
                    <button class="f-btn" onclick="setFilter('income',this)">Доходы</button>
                    <button class="f-btn" onclick="setFilter('expense',this)">Расходы</button>
                </div>
            </div>
            <div class="tx-list" id="txList"></div>
        </div>

    </main>

    <div class="toast" id="toast"></div>

    <!-- ═══════════════════════════════════════════════════
     FIREBASE SDK
     ═══════════════════════════════════════════════════ -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        // ════════════════════════════════════════════════════
        //  ⚙️  ВСТАВЬТЕ СЮДА СВОИ ДАННЫЕ ИЗ FIREBASE CONSOLE
        //      https://console.firebase.google.com
        // ════════════════════════════════════════════════════
        const firebaseConfig = {
            apiKey: "AIzaSyCjHLMMrmpUVStNt2bwqlHcH6md3DwXg3k",
            authDomain: "income-calc-acfe0.firebaseapp.com",
            projectId: "income-calc-acfe0",
            storageBucket: "income-calc-acfe0.firebasestorage.app",
            messagingSenderId: "339750751458",
            appId: "1:339750751458:web:18f945661ee811ae4722bb",
            measurementId: "G-2B2L21WH6K"
        };
        // ════════════════════════════════════════════════════

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Проверка инициализации
        firebase.auth().useDeviceLanguage();
        window.onerror = function (msg) {
            document.getElementById('loginScreen').classList.add('visible');
            console.error('Firebase error:', msg);
        };

        // ── DEFAULTS ──────────────────────────────────────────
        const DEF_INC = [
            { name: 'Зарплата', emoji: '💼' },
            { name: 'Фриланс', emoji: '💻' },
            { name: 'Подарок', emoji: '🎁' },
            { name: 'Инвестиции', emoji: '📈' },
            { name: 'Другое', emoji: '💡' },
        ];
        const DEF_EXP = [
            { name: 'Еда', emoji: '🍕' },
            { name: 'Транспорт', emoji: '🚗' },
            { name: 'Жильё', emoji: '🏠' },
            { name: 'Здоровье', emoji: '💊' },
            { name: 'Развлечения', emoji: '🎬' },
            { name: 'Одежда', emoji: '👗' },
            { name: 'Связь', emoji: '📱' },
            { name: 'Кредит', emoji: '🏦' },
            { name: 'Другое', emoji: '💡' },
        ];
        const EMOJIS = '💼💻🎁📈💡🍕🚗🏠💊🎬👗📱🏦🎓🐾✈️🛍️🍔☕🏋️🎮🌿🎵🎨🧾⚡🔧🏪🌮🥗🎯💰🏆🎪🎭'.match(/./gu);

        // ── STATE ─────────────────────────────────────────────
        let currentUser = null;
        let customInc = [];
        let customExp = [];
        let txs = [];
        let curType = 'income';
        let selCat = 'Зарплата';
        let selEmoji = '😊';
        let curFilter = 'all';
        let unsubTxs = null;   // Firestore listener unsubscribe

        function getCats(type) {
            return type === 'income' ? [...DEF_INC, ...customInc] : [...DEF_EXP, ...customExp];
        }

        // ── UI HELPERS ────────────────────────────────────────
        function showEl(id) { document.getElementById(id).style.display = ''; }
        function hideEl(id) { document.getElementById(id).style.display = 'none'; }
        function setSyncDot(state) { // 'idle' | 'syncing' | 'synced' | 'error'
            const d = document.getElementById('syncDot');
            d.className = 'sync-dot' + (state !== 'idle' ? ' ' + state : '');
        }

        // ── AUTH ──────────────────────────────────────────────
        function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(e => toast('⚠️ Ошибка входа: ' + e.message));
        }

        function logoutUser() {
            if (unsubTxs) { unsubTxs(); unsubTxs = null; }
            auth.signOut();
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;

                // Header
                hideEl('btnLogin');
                showEl('userInfo');
                const av = document.getElementById('userAvatar');
                if (user.photoURL) {
                    // Replace placeholder with <img>
                    av.outerHTML = `<img class="user-avatar" id="userAvatar" src="${user.photoURL}" alt="">`;
                } else {
                    av.textContent = (user.displayName || user.email || '?')[0].toUpperCase();
                }
                document.getElementById('userName').textContent = user.displayName || user.email || '';

                // Show app
                hideEl('loginScreen');
                hideEl('loadingOverlay');
                hideEl('appMain'); // hide until data loaded

                loadUserData();
            } else {
                currentUser = null;
                if (unsubTxs) { unsubTxs(); unsubTxs = null; }
                txs = []; customInc = []; customExp = [];

                // Header
                showEl('btnLogin');
                hideEl('userInfo');

                hideEl('loadingOverlay');
                hideEl('appMain');
                showEl('loginScreen');
                setSyncDot('idle');
            }
        });

        // ── FIRESTORE PATHS ───────────────────────────────────
        function userRef() { return db.collection('users').doc(currentUser.uid); }
        function txCollection() { return userRef().collection('transactions'); }

        // ── LOAD DATA ─────────────────────────────────────────
        async function loadUserData() {
            // Show loading overlay briefly
            document.getElementById('loadingOverlay').style.display = 'flex';
            setSyncDot('syncing');

            try {
                // Load settings (custom categories)
                const snap = await userRef().get();
                if (snap.exists) {
                    const d = snap.data();
                    customInc = d.customInc || [];
                    customExp = d.customExp || [];
                }

                // Subscribe to transactions in real time
                unsubTxs = txCollection()
                    .orderBy('ts', 'desc')
                    .onSnapshot(snap => {
                        txs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        render();
                        setSyncDot('synced');
                        setTimeout(() => setSyncDot('idle'), 2000);
                    }, err => {
                        console.error(err);
                        setSyncDot('error');
                        toast('⚠️ Ошибка синхронизации');
                    });

                // Init UI
                document.getElementById('dateInput').valueAsDate = new Date();
                const now = new Date();
                document.getElementById('headerDate') &&
                    (document.getElementById('headerDate').textContent =
                        now.toLocaleDateString('ru-RU', { weekday: 'short', day: 'numeric', month: 'long' }));

                const ep = document.getElementById('emPicker');
                ep.innerHTML = EMOJIS.map(e =>
                    `<span class="ep-em" onclick="pickEmoji('${e}')">${e}</span>`
                ).join('');

                setType('income');

                hideEl('loadingOverlay');
                showEl('appMain');

            } catch (e) {
                console.error(e);
                setSyncDot('error');
                toast('⚠️ Не удалось загрузить данные');
                hideEl('loadingOverlay');
                showEl('appMain'); // show anyway
            }
        }

        // ── SAVE SETTINGS ─────────────────────────────────────
        async function saveSettings() {
            if (!currentUser) return;
            setSyncDot('syncing');
            try {
                await userRef().set({ customInc, customExp }, { merge: true });
                setSyncDot('synced');
                setTimeout(() => setSyncDot('idle'), 1500);
            } catch (e) {
                setSyncDot('error');
                toast('⚠️ Не сохранилось: ' + e.message);
            }
        }

        // ── TYPE ──────────────────────────────────────────────
        function setType(t) {
            curType = t;
            document.getElementById('btnIncome').className = 'type-btn' + (t === 'income' ? ' active-income' : '');
            document.getElementById('btnExpense').className = 'type-btn' + (t === 'expense' ? ' active-expense' : '');
            document.getElementById('addBtn').className = 'add-btn ' + t + '-btn';
            selCat = getCats(t)[0].name;
            closeAdd();
            renderCats();
        }

        // ── CATEGORIES ────────────────────────────────────────
        function renderCats() {
            const cats = getCats(curType);
            const sc = document.getElementById('catScroll');
            const sc_cls = 'sel-' + curType;
            sc.innerHTML = cats.map(c => {
                const sel = c.name === selCat ? sc_cls : '';
                return `<div class="cat-card ${sel}" onclick="pickCat(this,'${esc(c.name)}')">
      <span class="cat-em">${c.emoji}</span>
      <span class="cat-nm">${c.name}</span>
    </div>`;
            }).join('') +
                `<div class="cat-card add-card" onclick="openAdd()">
    <span class="cat-em">＋</span>
    <span class="cat-nm">Своя</span>
  </div>`;
        }

        function pickCat(el, name) { selCat = name; closeAdd(); renderCats(); }

        function openAdd() {
            document.getElementById('newCatRow').classList.add('open');
            document.getElementById('ncInput').focus();
        }
        function closeAdd() {
            document.getElementById('newCatRow').classList.remove('open');
            document.getElementById('emPicker').classList.remove('open');
            document.getElementById('ncInput').value = '';
            selEmoji = '😊';
            document.getElementById('emBtn').textContent = '😊';
        }

        function toggleEP() { document.getElementById('emPicker').classList.toggle('open'); }
        function pickEmoji(e) {
            selEmoji = e;
            document.getElementById('emBtn').textContent = e;
            document.getElementById('emPicker').classList.remove('open');
        }

        async function confirmCat() {
            const name = document.getElementById('ncInput').value.trim();
            if (!name) { toast('Введите название'); return; }
            const entry = { name, emoji: selEmoji };
            if (curType === 'income') {
                if (!customInc.find(c => c.name === name)) customInc.push(entry);
            } else {
                if (!customExp.find(c => c.name === name)) customExp.push(entry);
            }
            selCat = name;
            closeAdd();
            renderCats();
            await saveSettings();
            toast('✅ Категория «' + name + '» добавлена');
        }

        // ── DATE ──────────────────────────────────────────────
        function shiftDate(d) {
            const inp = document.getElementById('dateInput');
            const dt = inp.value ? new Date(inp.value + 'T12:00:00') : new Date();
            dt.setDate(dt.getDate() + d);
            inp.value = dt.toISOString().split('T')[0];
        }

        // ── ADD TX ────────────────────────────────────────────
        async function addTx() {
            if (!currentUser) { toast('⚠️ Войдите в аккаунт'); return; }
            const raw = document.getElementById('amountInput').value;
            const amt = parseFloat(raw);
            if (!raw || isNaN(amt) || amt <= 0) { toast('⚠️ Введите корректную сумму'); return; }

            const cats = getCats(curType);
            const catObj = cats.find(c => c.name === selCat) || cats[0];
            const desc = document.getElementById('descInput').value.trim() || catObj.name;
            const date = document.getElementById('dateInput').value || new Date().toISOString().split('T')[0];

            const btn = document.getElementById('addBtn');
            btn.disabled = true;
            setSyncDot('syncing');

            try {
                await txCollection().add({
                    type: curType,
                    amount: amt,
                    category: catObj.name,
                    emoji: catObj.emoji,
                    desc,
                    date,
                    ts: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('amountInput').value = '';
                document.getElementById('descInput').value = '';
                toast(curType === 'income' ? '✅ Доход добавлен' : '✅ Расход добавлен');
            } catch (e) {
                toast('⚠️ Ошибка: ' + e.message);
                setSyncDot('error');
            } finally {
                btn.disabled = false;
            }
        }

        // ── DELETE ────────────────────────────────────────────
        async function delTx(id) {
            setSyncDot('syncing');
            try {
                await txCollection().doc(id).delete();
                toast('🗑 Запись удалена');
            } catch (e) {
                toast('⚠️ Ошибка удаления');
                setSyncDot('error');
            }
        }

        // ── RENDER ────────────────────────────────────────────
        function fmt(n) {
            return new Intl.NumberFormat('ru-RU', {
                style: 'currency', currency: 'RUB',
                minimumFractionDigits: 2, maximumFractionDigits: 2
            }).format(n);
        }
        function fmtD(d) {
            return new Date(d + 'T12:00:00').toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
        }

        function render() {
            const filtered = filterByPeriod(txs);
            const inc = filtered.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
            const exp = filtered.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
            const bal = inc - exp;

            const ba = document.getElementById('balAmount');
            ba.style.opacity = '0.4';
            setTimeout(() => { ba.textContent = fmt(bal); ba.style.opacity = '1'; }, 80);
            document.getElementById('totIncome').textContent = fmt(inc);
            document.getElementById('totExpense').textContent = fmt(exp);

            // Update balance card label
            const balLabel = document.querySelector('.bal-label');
            if (curPeriod === 'all') {
                balLabel.textContent = 'Общий баланс';
            } else if (curPeriod === 'month') {
                balLabel.textContent = 'Баланс за месяц';
            } else {
                balLabel.textContent = 'Баланс за неделю';
            }

            renderList();
            renderChart();
        }

        // ── PERIOD FILTER ─────────────────────────────────────
        let curPeriod = 'all'; // 'all' | 'week' | 'month'
        let periodOffset = 0;  // 0 = current, -1 = prev, etc.

        function setPeriod(p, el) {
            curPeriod = p;
            periodOffset = 0;
            document.querySelectorAll('.p-tab').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            const nav = document.getElementById('periodNav');
            if (p === 'all') {
                nav.classList.remove('visible');
            } else {
                nav.classList.add('visible');
                updatePeriodLabel();
            }
            render();
        }

        function shiftPeriod(dir) {
            periodOffset += dir;
            updatePeriodLabel();
            render();
        }

        function getPeriodRange() {
            const now = new Date();
            if (curPeriod === 'week') {
                const day = now.getDay() === 0 ? 6 : now.getDay() - 1; // Mon=0
                const monday = new Date(now);
                monday.setDate(now.getDate() - day + periodOffset * 7);
                monday.setHours(0,0,0,0);
                const sunday = new Date(monday);
                sunday.setDate(monday.getDate() + 6);
                sunday.setHours(23,59,59,999);
                return { from: monday, to: sunday };
            } else { // month
                const d = new Date(now.getFullYear(), now.getMonth() + periodOffset, 1);
                const from = new Date(d.getFullYear(), d.getMonth(), 1);
                const to = new Date(d.getFullYear(), d.getMonth() + 1, 0, 23, 59, 59, 999);
                return { from, to };
            }
        }

        function updatePeriodLabel() {
            const el = document.getElementById('periodLabel');
            if (curPeriod === 'month') {
                const now = new Date();
                const d = new Date(now.getFullYear(), now.getMonth() + periodOffset, 1);
                const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
                el.textContent = MONTHS[d.getMonth()] + ' ' + d.getFullYear();
            } else {
                const { from, to } = getPeriodRange();
                const fmt = d => d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
                el.textContent = fmt(from) + ' – ' + fmt(to);
            }
        }

        function filterByPeriod(list) {
            if (curPeriod === 'all') return list;
            const { from, to } = getPeriodRange();
            return list.filter(t => {
                const d = new Date(t.date + 'T12:00:00');
                return d >= from && d <= to;
            });
        }

        function setFilter(f, el) {
            curFilter = f;
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            renderList();
        }

        function renderList() {
            const el = document.getElementById('txList');
            let items = filterByPeriod(txs);
            if (curFilter !== 'all') items = items.filter(t => t.type === curFilter);
            if (!items.length) {
                el.innerHTML = `<div class="empty"><div class="ei">💳</div><p>Записей пока нет</p></div>`;
                return;
            }
            el.innerHTML = items.map(t => `
    <div class="tx-item">
      <div class="tx-ic ${t.type}">${t.emoji || '💡'}</div>
      <div class="tx-inf">
        <div class="tx-desc">${escH(t.desc)}</div>
        <div class="tx-meta">
          <span class="tx-dt">${fmtD(t.date)}</span>
          <span class="tx-badge">${escH(t.category)}</span>
        </div>
      </div>
      <div class="tx-right">
        <span class="tx-amt ${t.type}">${t.type === 'income' ? '+' : '−'}${fmt(t.amount)}</span>
        <button class="tx-del" onclick="delTx('${t.id}')">✕</button>
      </div>
    </div>
  `).join('');
        }

        function renderChart() {
            if (txs.length < 2) { document.getElementById('chartCard').style.display = 'none'; return; }
            document.getElementById('chartCard').style.display = 'block';
            const months = {};
            txs.forEach(t => {
                const k = t.date.slice(0, 7);
                if (!months[k]) months[k] = { income: 0, expense: 0 };
                months[k][t.type] += t.amount;
            });
            const keys = Object.keys(months).sort().slice(-6);
            const maxV = Math.max(...keys.flatMap(k => [months[k].income, months[k].expense]), 1);
            const MN = ['Янв', 'Фев', 'Мар', 'Апр', 'Май', 'Июн', 'Июл', 'Авг', 'Сен', 'Окт', 'Ноя', 'Дек'];
            document.getElementById('chartBars').innerHTML = keys.map(k => {
                const ih = Math.round((months[k].income / maxV) * 66);
                const eh = Math.round((months[k].expense / maxV) * 66);
                const lbl = MN[parseInt(k.split('-')[1]) - 1];
                return `<div class="chart-col">
      <div class="bar-wrap">
        <div class="bar in" style="height:${ih}px"></div>
        <div class="bar ex" style="height:${eh}px"></div>
      </div>
      <div class="bar-lbl">${lbl}</div>
    </div>`;
            }).join('');
        }

        // ── UTILS ─────────────────────────────────────────────
        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2400);
        }
        function escH(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
        function esc(s) { return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }
    </script>
</body>
</html>
